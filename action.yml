name: 'Guidance Comments'
description: 'Gives developer guidance in PR comments.'
branding:
    icon: 'message-square'
    color: 'purple'

inputs:
    name:
        description: 'The unique identifier for the guidance type.'
        required: true
    pr-number:
        description: 'The pull request number to post guidance to.'
        required: true
    show-guidance:
        description: 'If the guidance should be shown.'
        required: true
    guidance-body:
        description: 'Body to show in the Guidance state. If empty or unset, any
            existing guidance is removed.'
        required: false
        default: ''
    resolved-body:
        description: 'Body to show in the Resolved state. If empty or unset, any
            existing guidance is removed.'
        required: false
        default: ''
    token:
        description: 'GitHub token for API access. Defaults to GITHUB_TOKEN.'
        required: false
        default: ${{ github.token }}

runs:
    using: 'composite'
    steps:
        - name: Validate inputs
          shell: bash
          env:
              SHOW_GUIDANCE: ${{ inputs.show-guidance }}
          run: |
              # Fail fast on an unexpected show-guidance value; otherwise every
              # branch below silently evaluates false and the action does nothing.
              if [ "$SHOW_GUIDANCE" != 'true' ] && [ "$SHOW_GUIDANCE" != 'false' ]; then
                  echo "::error::show-guidance must be 'true' or 'false', got '${SHOW_GUIDANCE}'"
                  exit 1
              fi
        - name: Build guidance tag
          id: guidance-tag
          shell: bash
          env:
              NAME: ${{ inputs.name }}
          run: |
              # Pass inputs via env and write to $GITHUB_OUTPUT with a
              # heredoc delimiter so a crafted `name` cannot inject shell
              # commands or additional step outputs.
              {
                  echo "tag<<GUIDANCE_EOF"
                  echo "<!-- guidance-comment: ${NAME} -->"
                  echo "GUIDANCE_EOF"
              } >> "$GITHUB_OUTPUT"
        - name: Find Guidance
          uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3.1.0
          id: find-comment
          with:
              token: ${{ inputs.token }}
              issue-number: ${{ inputs.pr-number }}
              body-includes: ${{ steps.guidance-tag.outputs.tag }}
        # Echo out the inputs and guidance state for debugging. Only runs
        # when step debug logging is enabled (re-run with debug logging, or
        # set the ACTIONS_STEP_DEBUG secret) so input content is not written
        # to logs on every run.
        - name: Debug Guidance
          if: ${{ runner.debug == '1' }}
          shell: bash
          env:
              SHOW_GUIDANCE: ${{ inputs.show-guidance }}
              GUIDANCE_BODY: ${{ inputs.guidance-body }}
              RESOLVED_BODY: ${{ inputs.resolved-body }}
              COMMENT_ID: ${{ steps.find-comment.outputs.comment-id }}
          run: |
              # Reference inputs via env vars so their content is treated as
              # data, never as shell to execute.
              echo "show-guidance='${SHOW_GUIDANCE}'"
              echo "guidance-body='${GUIDANCE_BODY}'"
              echo "resolved-body='${RESOLVED_BODY}'"
              echo "comment-id='${COMMENT_ID}'"
        # Create guidance when it should be shown and none exists yet.
        - name: Create Guidance
          if: ${{ inputs.show-guidance == 'true' && inputs.guidance-body !=
              '' && steps.find-comment.outputs.comment-id == '' }}
          uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
          with:
              token: ${{ inputs.token }}
              issue-number: ${{ inputs.pr-number }}
              body: |
                  ${{ steps.guidance-tag.outputs.tag }}
                  ${{ inputs.guidance-body }}
        - name: Update Guidance
          if: ${{ steps.find-comment.outputs.comment-id != '' &&
              inputs.show-guidance == 'true' && inputs.guidance-body != '' }}
          uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
          with:
              token: ${{ inputs.token }}
              issue-number: ${{ inputs.pr-number }}
              comment-id: ${{ steps.find-comment.outputs.comment-id }}
              edit-mode: replace
              body: |
                  ${{ steps.guidance-tag.outputs.tag }}
                  ${{ inputs.guidance-body }}
        # Remove the existing guidance whenever one exists but the body that
        # would be shown is empty: either guidance is requested with an empty
        # guidance-body, or guidance is resolved with an empty resolved-body.
        - name: Remove Guidance
          if: ${{ steps.find-comment.outputs.comment-id != '' &&
              ((inputs.show-guidance == 'true' && inputs.guidance-body ==
              '') || (inputs.show-guidance == 'false' &&
              inputs.resolved-body == '')) }}
          uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
          env:
              COMMENT_ID: ${{ steps.find-comment.outputs.comment-id }}
          with:
              github-token: ${{ inputs.token }}
              script: |
                  // Read the comment id from env rather than interpolating it
                  // into the script, so it is passed as data, not code.
                  await github.rest.issues.deleteComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: Number(process.env.COMMENT_ID)
                  })
        - name: Update Resolved Guidance
          if: ${{ inputs.show-guidance == 'false' && inputs.resolved-body != ''
              && steps.find-comment.outputs.comment-id != '' }}
          uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
          with:
              token: ${{ inputs.token }}
              issue-number: ${{ inputs.pr-number }}
              comment-id: ${{ steps.find-comment.outputs.comment-id }}
              edit-mode: replace
              body: |
                  ${{ steps.guidance-tag.outputs.tag }}
                  ${{ inputs.resolved-body }}
