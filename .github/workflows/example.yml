name: Example
on:
    pull_request:
        # Adding "edited" because I'm checking the text content of the PR description
        types: [opened, synchronize, reopened, edited]
# Serialize runs for a given PR so overlapping events cannot both look for
# the guidance, find none, and each create a duplicate. cancel-in-progress
# is false so each queued run completes and the next one sees its result.
concurrency:
    group: guidance-${{ github.workflow }}-${{ github.event.pull_request.number }}
    cancel-in-progress: false
jobs:
    offerHelp:
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
            contents: read
        steps:
            - name: 'Check out code'
              uses: actions/checkout@v4
            - name: See if there are problems
              id: check-for-issues
              uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
              with:
                  script: |
                      const prBody = context.payload.pull_request.body || "";
                      let issue = "";
                      const match = prBody.match(/run the test workflow(?: (\w+))?/i);
                      if (match) {
                        if (match[1]) {
                          issue = `It looks like your PR description has the phrase "run the test workflow ${match[1]}" in it`;
                        } else {
                          issue = 'It looks like your PR description has the phrase "run the test workflow" in it';
                        }
                      }
                      core.setOutput("issue", issue);
            - name: Add guidance
              #   uses: betatorbust/guidance-comments@v2
              uses: ./ # using the local version of ^^
              with:
                  name: 'example-guidance'
                  pr-number: ${{github.event.pull_request.number}}
                  show-guidance:
                      ${{ steps.check-for-issues.outputs.issue != '' }}

                  guidance-body: |
                      Hi! It looks like there might be an issue:
                      ${{ steps.check-for-issues.outputs.issue }}
                  resolved-body: |
                      Thanks for addressing the issue!
